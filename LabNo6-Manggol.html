<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Using Web Media</title>
    <link rel="stylesheet" href="lab6_manggol.css" />
</head>
<body>
    <header>
        <h2>Share Your Travels</h2>
        <nav><img src="menu.png" alt="mobile menu icon"></nav>
    </header>

    <main>
        <section>
            <h1>HTML5 Video</h1>

            <figure>
                <video controls width="480">
                    <source src="paris.mp4" type="video/mp4">
                    <source src="paris.webm" type="video/webm">
                    <source src="paris.ogv" type="video/ogg">
                    Your browser does not support the video tag.
                </video>
                <figcaption>Source: <br>
                    <a href="https://videos.pexels.com/videos/arc-de-triomphe-in-paris-470">
                        https://videos.pexels.com/videos/arc-de-triomphe-in-paris-470
                    </a>
                </figcaption>
            </figure>

            <figure>
                <video controls width="480">
                    <source src="lake.mp4" type="video/mp4">
                    <source src="lake.webm" type="video/webm">
                    Your browser does not support the video tag.
                </video>
                <figcaption>Source: <br>
                    <a href="https://videos.pexels.com/videos/timelapse-video-at-a-lake-435">
                        https://videos.pexels.com/videos/timelapse-video-at-a-lake-435
                    </a>
                </figcaption>
            </figure>

            <figure>
                <video controls width="480">
                    <source src="sunset.mp4" type="video/mp4">
                    <source src="sunset.webm" type="video/webm">
                    Your browser does not support the video tag.
                </video>
                <figcaption>Source: <br>
                    <a href="https://videos.pexels.com/videos/sunset-at-a-lake-464">
                        https://videos.pexels.com/videos/sunset-at-a-lake-464
                    </a>
                </figcaption>
            </figure>
        </section>
    </main>
</body>
</html>
